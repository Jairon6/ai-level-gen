name: Build Geode Mod (Android ARM64)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-android64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build mod with Geode SDK
        uses: geode-sdk/build-geode-mod@main
        with:
          target: android64
          build-config: Release
      - name: Upload .geode file
        uses: actions/upload-artifact@v4
        with:
          name: developer.ai-level-generator.geode
          path: "*.geode"
          if-no-files-found: error
